<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Card - Pham Nhi</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #FDF5E6; /* Gentle Beige */
            --card-bg: rgba(255, 255, 255, 0.9);
            --accent-gold: #C5A059; /* Luxury Gold */
            --text-dark: #3E3E3E;
            --text-light: #7A7A7A;
            --shadow: 0 10px 30px rgba(197, 160, 89, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #FDF5E6 0%, #EADDCA 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-dark);
            padding: 20px;
        }

        .card-container {
            width: 100%;
            max-width: 400px;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            overflow: hidden;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.5);
            text-align: center;
            position: relative;
        }

        .header-image {
            height: 160px;
            background: url('https://sc02.alicdn.com/kf/A1c76ca3f05d640d4af82735564e8bab2S.png') center/cover;
            position: relative;
        }

        .header-image::after {
            content: '';
            position: absolute;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px; /* Slightly larger avatar */
            height: 120px;
            border-radius: 50%;
            border: 5px solid white;
            background: #fff url('https://sc04.alicdn.com/kf/S82d710bb5a4f48dcb0a479c4954fd6bcO.jpg') center/cover no-repeat;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .content {
            padding: 75px 30px 40px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            margin-bottom: 5px;
            color: var(--accent-gold);
            letter-spacing: 0.5px;
        }

        .title {
            font-size: 14px;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .slogan {
            font-size: 12px;
            color: var(--accent-gold);
            font-style: italic;
            margin-bottom: 25px;
            font-weight: 500;
            line-height: 1.4;
        }

        .action-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 30px;
        }

        .action-item {
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .icon-circle {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            border: 1px solid rgba(197, 160, 89, 0.2);
        }

        .icon-circle:active {
            transform: scale(0.9);
            background: var(--accent-gold);
        }

        .icon-circle svg {
            width: 22px;
            height: 22px;
            fill: var(--accent-gold);
        }

        .icon-circle:active svg {
            fill: white;
        }

        .icon-label {
            font-size: 10px;
            color: var(--text-light);
            font-weight: 500;
        }

        .info-list {
            text-align: left;
            margin-bottom: 30px;
            border-top: 1px solid rgba(197, 160, 89, 0.1);
            padding-top: 25px;
        }

        .info-row {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            margin-bottom: 18px;
            text-decoration: none;
            color: inherit;
        }

        .info-icon {
            color: var(--accent-gold);
            flex-shrink: 0;
            margin-top: 2px;
        }

        .info-text div:first-child {
            font-size: 11px;
            color: var(--text-light);
            margin-bottom: 2px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .info-text div:last-child {
            font-size: 14px;
            font-weight: 400;
            line-height: 1.4;
        }

        .qr-section {
            background: rgba(197, 160, 89, 0.05);
            padding: 20px;
            border-radius: 20px;
            margin-top: 10px;
        }

        .qr-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .tab-btn {
            background: transparent;
            border: 1px solid var(--accent-gold);
            color: var(--accent-gold);
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: var(--accent-gold);
            color: white;
        }

        .qr-display img {
            width: 130px;
            height: 130px;
            border-radius: 10px;
            background: white;
            padding: 5px;
            border: 1px solid rgba(197, 160, 89, 0.2);
        }

        .save-btn {
            width: 100%;
            background: var(--accent-gold);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(197, 160, 89, 0.3);
            transition: transform 0.2s;
        }

        .save-btn:active {
            transform: scale(0.98);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-container {
            animation: fadeIn 0.8s ease-out;
        }

    </style>
</head>

<script>
    function switchQR(type, btn) {
        const qrImg = document.getElementById('qrImg');
        const btns = document.querySelectorAll('.tab-btn');
        btns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        if (type === 'zalo') {
            qrImg.src = 'https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://zalo.me/84974965909';
        } else {
            qrImg.src = 'https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://wa.me/84974965909';
        }
    }

    function downloadVCard() {
        const vcard = `BEGIN:VCARD
VERSION:3.0
FN:Pham Nhi
ORG:Alibaba.com Vietnam
TITLE:Business Specialist
TEL;TYPE=CELL,VOICE:+84974965909
EMAIL;TYPE=PREF,INTERNET:phamnhi01@alibaba-inc.com
URL:https://www.linkedin.com/in/phamnhi112001
ADR;TYPE=WORK:;;Floor 10, Becamex Tower, 230 Binh Duong Blvd;Thu Dau Mot;Binh Duong;;Vietnam
END:VCARD`;
        
        const blob = new Blob([vcard], { type: 'text/vcard' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'Pham_Nhi_Alibaba.vcf';
        a.click();
        window.URL.revokeObjectURL(url);
    }
</script>
